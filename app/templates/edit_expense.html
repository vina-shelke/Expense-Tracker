<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-xl mb-4">Edit Expense</h2>

  <form method="POST">
    <input name="title"
           value="{{ expense.title }}"
           class="border p-2 w-full mb-2"
           required>

    <select name="category" class="border p-2 w-full mb-2">
      {% for c in categories %}
        <option value="{{ c.name }}"
          {% if c.name == expense.category %}selected{% endif %}>
          {{ c.name }}
        </option>
      {% endfor %}
    </select>

    <input type="number"
           step="0.01"
           name="amount"
           value="{{ expense.amount }}"
           class="border p-2 w-full mb-2"
           required>

    <input type="date"
           name="expense_date"
           value="{{ expense.expense_date }}"
           class="border p-2 w-full mb-4">

    <button class="bg-blue-600 text-white w-full py-2 rounded">
      Save
    </button>
  </form>

  <a href="/" class="block text-center text-gray-600 mt-4">Cancel</a>
</div>

</body>
</html>
