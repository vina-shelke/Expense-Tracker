<!DOCTYPE html>
<html>
<head>
  <title>Login · Finance Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center px-4">

  <div class="w-full max-w-md">
    <!-- Brand -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-indigo-700">Finance Tracker</h1>
      <p class="text-gray-500 mt-1">Track. Analyze. Control.</p>
    </div>

    <!-- Card -->
    <form method="POST" class="bg-white rounded-2xl shadow-xl p-8 space-y-4">

      <h2 class="text-xl font-semibold text-gray-800 text-center">
        Welcome back
      </h2>

      {% if error %}
        <div class="bg-red-50 text-red-600 text-sm p-3 rounded">
          {{ error }}
        </div>
      {% endif %}

      <!-- Username -->
      <div>
        <label class="text-sm text-gray-600">Username</label>
        <input
          name="username"
          placeholder="e.g. rahul.patil"
          class="mt-1 w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          required>
      </div>

      <!-- Password -->
      <div>
        <label class="text-sm text-gray-600">Password</label>
        <input
          type="password"
          name="password"
          placeholder="••••••••"
          class="mt-1 w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          required>
      </div>

      <!-- Submit -->
      <button
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-lg font-medium transition">
        Login
      </button>

      <!-- Footer -->
      <p class="text-sm text-center text-gray-500">
        Don’t have an account?
        <a href="/signup" class="text-indigo-600 hover:underline font-medium">
          Sign up
        </a>
      </p>

    </form>

    <!-- Bottom note -->
    <p class="text-xs text-center text-gray-400 mt-6">
      © {{ now().year if now else "" }} Finance Tracker
    </p>
  </div>

</body>
</html>
